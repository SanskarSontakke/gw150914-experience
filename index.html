<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GW150914 Experience</title>
    <style>
        :root {
            --bg-color: #121212;
            --text-high: rgba(255, 255, 255, 0.87);
            --text-med: rgba(255, 255, 255, 0.60);
            --accent: #00e5ff;
            --accent-glow: rgba(0, 229, 255, 0.6);
            --disabled-bg: #333333;
            --disabled-text: rgba(255, 255, 255, 0.38);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body, html {
            background-color: var(--bg-color);
            color: var(--text-high);
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .container {
            width: 100%;
            max-width: 400px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            transition: all 0.1s ease;
            position: relative;
        }

        /* Screen Shake for Merger Phase */
        @keyframes screenShake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-2px, -2px) rotate(-0.5deg); }
            20% { transform: translate(-3px, 0px) rotate(0.5deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(0.5deg); }
            50% { transform: translate(-1px, 2px) rotate(-0.5deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-0.5deg); }
            80% { transform: translate(-1px, -1px) rotate(0.5deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-0.5deg); }
        }

        .merger-active {
            animation: screenShake 0.1s infinite;
        }

        /* Ambient Glow for Merger */
        .merger-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 150vw;
            height: 150vh;
            background: radial-gradient(circle, rgba(0,229,255,0.15) 0%, rgba(18,18,18,0) 70%);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.1s;
            z-index: -1;
        }

        .merger-active .merger-glow {
            opacity: 1;
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Orbital Visualizer */
        .visualizer {
            position: relative;
            width: 260px;
            height: 260px;
            margin: 40px 0;
            border-radius: 50%;
            border: 1px dashed rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .black-hole {
            position: absolute;
            width: 24px;
            height: 24px;
            background-color: #fff;
            border-radius: 50%;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.8), 0 0 30px var(--accent-glow);
            top: 50%;
            left: 50%;
            margin-top: -12px;
            margin-left: -12px;
            transition: opacity 0.2s, transform 0s; /* JS handles transform frame-by-frame */
        }

        /* Ringdown Pulse Animation */
        @keyframes ringdownPulse {
            0% { transform: scale(1.5); box-shadow: 0 0 20px #fff, 0 0 50px var(--accent); opacity: 1; }
            100% { transform: scale(1.0); box-shadow: 0 0 5px #fff, 0 0 15px var(--accent-glow); opacity: 0.6; }
        }

        .pulsing {
            animation: ringdownPulse 0.8s cubic-bezier(0.1, 0.7, 0.1, 1) infinite alternate;
        }

        /* Live Telemetry Display */
        .telemetry-box {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(0, 229, 255, 0.3);
            border-radius: 8px;
            padding: 16px;
            width: 100%;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 32px;
            font-family: "Courier New", Courier, monospace;
            font-size: 14px;
            font-weight: bold;
            color: var(--accent);
            text-transform: uppercase;
            box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.5);
        }

        .telemetry-text {
            text-align: center;
            line-height: 1.4;
        }

        .merger-text {
            color: #fff;
            text-shadow: 0 0 8px var(--accent);
            font-size: 15px;
        }

        /* Action Button */
        button {
            width: 100%;
            padding: 18px 24px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 12px;
            background-color: var(--accent);
            color: #000;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(0, 229, 255, 0.2);
            touch-action: manipulation;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        button:active:not(:disabled) {
            transform: scale(0.97);
            background-color: #00b3cc;
        }

        button:disabled {
            background-color: var(--disabled-bg);
            color: var(--disabled-text);
            cursor: not-allowed;
            box-shadow: none;
        }
    </style>
</head>
<body>

    <div class="container" id="main-container">
        <div class="merger-glow"></div>
        <h1>GW150914</h1>
        
        <div class="visualizer" id="visualizer">
            <div class="black-hole" id="bh1"></div>
            <div class="black-hole" id="bh2"></div>
        </div>

        <div class="telemetry-box">
            <div class="telemetry-text" id="telemetry">SYSTEM STANDBY<br>AWAITING DATA</div>
        </div>
        
        <button id="experience-btn" disabled>Loading Data...</button>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const btn = document.getElementById('experience-btn');
            const telemetry = document.getElementById('telemetry');
            const container = document.getElementById('main-container');
            const bh1 = document.getElementById('bh1');
            const bh2 = document.getElementById('bh2');
            
            // Core Assets
            const AUDIO_FILE = 'gw150914_shifted_chirp.wav';
            const audioObj = new Audio(AUDIO_FILE);
            audioObj.preload = 'auto';

            let hapticArray = [];
            
            // Updated default metadata to match the new backend structure
            let metadata = {
                duration: 15.0,
                phases: {
                    inspiral: [0.0, 13.846],
                    merger: [13.846, 14.2],
                    ringdown: [14.2, 15.0]
                }
            };
            
            let isVibrateSupported = 'vibrate' in navigator;
            let animationFrameId = null;
            let hapticInterval = null; // Real-time haptic sync loop

            // Fetch Data
            async function loadData() {
                try {
                    // Fetch the 20Hz floating point intensity array
                    const hapticRes = await fetch('gw150914_haptic_envelope.json');
                    if (hapticRes.ok) hapticArray = await hapticRes.json();
                    
                    // Fetch nested metadata
                    const metaRes = await fetch('metadata.json');
                    if (metaRes.ok) metadata = await metaRes.json();

                } catch (e) {
                    console.warn("Files not found locally, using default fallback constraints.");
                } finally {
                    btn.disabled = false;
                    btn.textContent = "Experience GW150914";
                    telemetry.innerHTML = "DATA LOADED<br>READY FOR PLAYBACK";
                }
            }

            // Real-Time Haptic Sync Engine
            function syncHaptics() {
                if (audioObj.paused || audioObj.ended) {
                    clearInterval(hapticInterval);
                    return;
                }

                // Derive current array index (20 samples per second)
                let index = Math.floor(audioObj.currentTime * 20);
                
                if (index < hapticArray.length) {
                    let intensity = hapticArray[index];
                    if (intensity !== undefined) {
                        let vibeTime = Math.round(intensity * 50);
                        if (vibeTime > 0) {
                            navigator.vibrate(vibeTime);
                        }
                    }
                }
            }

            // Visual Sync Engine: UI Animation Loop
            function syncLoop() {
                const t = audioObj.currentTime;
                
                // FIXED: Safely extract merger times whether it's nested in "phases" or at root
                const phases = metadata.phases ? metadata.phases : metadata;
                const mStart = phases.merger[0];
                const mEnd = phases.merger[1];
                
                const maxR = 110; // Max orbital radius in pixels

                if (t >= 0 && t < mStart) {
                    // PHASE: INSPIRAL
                    telemetry.className = "telemetry-text";
                    telemetry.innerHTML = "PHASE: INSPIRAL<br>Black holes accelerating";
                    container.classList.remove('merger-active');
                    
                    bh1.classList.remove('pulsing');
                    bh2.style.opacity = '1';
                    
                    // Orbital Math: Base steady rotation + exponential speedup
                    const progress = Math.min(t / mStart, 1); 
                    const radius = maxR * Math.pow(1 - progress, 0.35); 
                    
                    // FIXED: Added (t * 3) baseline speed so they spin visibly from second 0
                    const theta = (t * 3) + 120 * Math.pow(progress, 4); 

                    bh1.style.transform = `translate(${radius * Math.cos(theta)}px, ${radius * Math.sin(theta)}px) scale(1)`;
                    bh2.style.transform = `translate(${radius * Math.cos(theta + Math.PI)}px, ${radius * Math.sin(theta + Math.PI)}px) scale(1)`;

                } else if (t >= mStart && t < mEnd) {
                    // PHASE: MERGER
                    telemetry.className = "telemetry-text merger-text";
                    telemetry.innerHTML = "PHASE: MERGER<br>Collision and peak energy release";
                    container.classList.add('merger-active');
                    
                    // Overlap into one massive circle
                    bh2.style.opacity = '0';
                    bh1.style.transform = `translate(0px, 0px) scale(1.8)`;
                    bh1.classList.remove('pulsing');

                } else if (t >= mEnd) {
                    // PHASE: RINGDOWN
                    telemetry.className = "telemetry-text";
                    telemetry.innerHTML = "PHASE: RINGDOWN<br>Settling into a single black hole";
                    container.classList.remove('merger-active');
                    
                    bh2.style.opacity = '0';
                    bh1.style.transform = `translate(0px, 0px)`;
                    bh1.classList.add('pulsing'); // Pulse CSS takes over
                }

                // Continue loop if playing
                if (!audioObj.paused && !audioObj.ended) {
                    animationFrameId = requestAnimationFrame(syncLoop);
                } else if (audioObj.ended) {
                    resetUI();
                }
            }

            function resetUI() {
                telemetry.className = "telemetry-text";
                telemetry.innerHTML = "EVENT COMPLETE<br>PRESS PLAY TO RESTART";
                container.classList.remove('merger-active');
                bh1.classList.remove('pulsing');
                bh2.style.opacity = '1';
                bh1.style.transform = `translate(${110}px, 0px) scale(1)`;
                bh2.style.transform = `translate(${-110}px, 0px) scale(1)`;
                
                if (hapticInterval) clearInterval(hapticInterval);
                if (animationFrameId) cancelAnimationFrame(animationFrameId);
            }

            // Initialization & Interaction
            btn.addEventListener('click', () => {
                if (!isVibrateSupported) {
                    alert("Note: Web Haptics not supported on this device/browser. Playing audio and visualizer only.");
                    isVibrateSupported = true;
                }

                // Reset state
                resetUI();
                audioObj.currentTime = 0;
                
                // Fire Audio & Start Synchronization Engines
                audioObj.play().then(() => {
                    // 1. Continuous 50ms PWM Haptic Engine
                    if (isVibrateSupported && hapticArray.length > 0) {
                        hapticInterval = setInterval(syncHaptics, 50);
                    }
                    // 2. Start Visual Loop
                    animationFrameId = requestAnimationFrame(syncLoop);
                }).catch(e => {
                    console.error("Playback blocked:", e);
                    alert("Audio playback was blocked by the browser. Please ensure your device is not on silent.");
                });
            });

            // Set initial standby positions
            bh1.style.transform = `translate(${110}px, 0px)`;
            bh2.style.transform = `translate(${-110}px, 0px)`;

            loadData();
        });
    </script>
</body>
</html>
